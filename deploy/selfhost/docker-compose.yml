# Eddytor self-host — standalone, no source required.
#
# Pulls prebuilt public images from ghcr.io and runs the full stack
# (postgres + garage + server + engine). Configuration is split — you should not
# need to edit this file:
#
#   ~/eddytor/
#   ├── docker-compose.yml   ← this file (replaced on upgrade)
#   ├── config.toml          ← non-secret settings (public URL, CORS, …)
#   └── .env                 ← secrets + bundled-stack wiring (generated)
#
# Quickstart:
#   curl -fsSL https://get.eddytor.com | sh        # scaffolds the above + starts it
#
# Eddytor is API-first — you drive it with the `eddytor` CLI, the REST API, or
# MCP. The installer prints the command that mints an admin API key. An optional
# web UI ships as a compose profile: the installer enables it when you opt in
# (it writes COMPOSE_PROFILES=ui to .env), or enable it yourself:
#
#   echo 'COMPOSE_PROFILES=ui' >> .env && docker compose pull && docker compose up -d
#
# Mail: with no SMTP configured (default), sign-in magic links are written to
# the server logs (`docker compose logs eddytor-server`). Set EDDYTOR_SMTP_* in
# .env to deliver real email to your users.
#
# Upgrade: re-run the installer (it re-downloads this file and bumps
# EDDYTOR_VERSION in .env), or bump .env yourself and `docker compose pull && up -d`.
#
# Ports: only the public ports (8080 HTTP, 8082 Flight SQL, 3000 web UI) honor
# EDDYTOR_BIND_ADDR. Postgres, Garage, and the engine are infrastructure with
# bundled default credentials — they stay pinned to 127.0.0.1 no matter what.
# To expose Eddytor beyond this host, set EDDYTOR_BIND_ADDR=0.0.0.0 and put TLS
# in front (see HOSTING.md).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eddytor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eddytor}
      POSTGRES_DB: ${POSTGRES_DB:-eddytor}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eddytor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Garage — S3-compatible object store by Deuxfleurs
  # (https://garagehq.deuxfleurs.fr), licensed AGPLv3. We bundle their published
  # image unmodified; thanks to the Garage folks for a great piece of software.
  # `--single-node --default-bucket` auto-creates the access key + bucket from
  # the GARAGE_DEFAULT_* env on first boot, so no bucket-create sidecar is
  # needed. Single sqlite node, eval-only (no HA). garage.toml carries the
  # rpc_secret/admin_token (generated by the installer).
  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: ${EDDYTOR_BUCKET:-eddytor}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    ports:
      - "127.0.0.1:3900:3900"
    # Scratch image — only the /garage binary exists (no shell/wget/curl), so
    # the healthcheck must exec it directly. `status` exits 0 once the node is up.
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 3s
      retries: 12

  eddytor-server:
    image: ghcr.io/nordalf/eddytor-ce-server:${EDDYTOR_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_started
    # Secrets + bundled-stack wiring come from .env; non-secret settings from the
    # mounted config.toml. Leave SMTP unset in .env to log magic links to stdout
    # (NoopMailService); set EDDYTOR_SMTP_* for email.
    env_file:
      - .env
    environment:
      EDDYTOR_CONFIG_FILE: /etc/eddytor/config.toml
    volumes:
      - ./config.toml:/etc/eddytor/config.toml:ro
    ports:
      - "${EDDYTOR_BIND_ADDR:-127.0.0.1}:8080:8080"
      # Flight SQL proxy — `eddytor query` connects here (see flight_url below).
      - "${EDDYTOR_BIND_ADDR:-127.0.0.1}:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  eddytor-engine:
    image: ghcr.io/nordalf/eddytor-ce-engine:${EDDYTOR_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # The engine gets only what it uses: the DB, the encryption key, and the
    # API-key HMAC secret (it validates API keys on every proxied request —
    # same value as the server or all keys 401). It never mints magic links,
    # so it doesn't get the rest of .env.
    environment:
      EDDYTOR_CONFIG_FILE: /etc/eddytor/config.toml
      EDDYTOR_SKIP_MIGRATIONS: "true"
      EDDYTOR_DATABASE_URL: ${EDDYTOR_DATABASE_URL}
      EDDYTOR_ENCRYPTION_KEY: ${EDDYTOR_ENCRYPTION_KEY}
      EDDYTOR_API_KEY_SECRET: ${EDDYTOR_API_KEY_SECRET}
    volumes:
      - ./config.toml:/etc/eddytor/config.toml:ro
    # Internal-only: the server proxies Flight SQL (8082) and MCP for you.
    # Loopback access kept for debugging.
    ports:
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:50052:50052"
      - "127.0.0.1:50053:50053"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:50051/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  # Optional web UI — only started when the `ui` profile is active
  # (COMPOSE_PROFILES=ui in .env, or `docker compose --profile ui up -d`).
  # The browser talks only to the UI's own origin: a same-origin BFF proxy
  # forwards to eddytor-server server-to-server, so the backend needs no CORS
  # entry for the UI — but the UI origin MUST be registered as a web
  # redirect_uri (the installer writes EDDYTOR__SERVER__WEB_REDIRECT_URIS to
  # .env when you opt in).
  eddytor-ui:
    profiles: ["ui"]
    image: ghcr.io/nordalf/eddytor-ce-ui:${EDDYTOR_UI_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      eddytor-server:
        condition: service_healthy
    environment:
      # Backend origin for the OAuth login redirect (a top-level browser
      # navigation) — the public server URL, not the compose service name.
      EDDYTOR_API_BASE_URL: ${EDDYTOR_UI_API_BASE_URL:-http://localhost:8080}
      # Server-to-server path for the BFF proxy + gRPC routes — compose service
      # name, plaintext h2c.
      EDDYTOR_INTERNAL_API_URL: eddytor-server:8080
      # This UI's own public origin. Must be registered as a web redirect_uri
      # on the server (EDDYTOR__SERVER__WEB_REDIRECT_URIS in .env).
      EDDYTOR_UI_ORIGIN: ${EDDYTOR_UI_ORIGIN:-http://localhost:3000}
      EDDYTOR_WEB_CLIENT_ID: eddytor-web
      # Empty = host-only cookie (correct for separate localhost origins).
      EDDYTOR_COOKIE_DOMAIN: ${EDDYTOR_UI_COOKIE_DOMAIN:-}
    ports:
      - "${EDDYTOR_BIND_ADDR:-127.0.0.1}:3000:3000"

volumes:
  postgres-data:
  garage-meta:
  garage-data:
