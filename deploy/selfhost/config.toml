# Eddytor self-host — non-secret configuration.
#
# Everything here is safe to read and commit; there are NO secrets in this file
# (those live in `.env`, generated by the installer). Edit a value, then apply:
#
#   docker compose restart eddytor-server eddytor-engine
#
# Any single key can also be overridden at runtime with an EDDYTOR__SECTION__KEY
# environment variable in `.env` (e.g. EDDYTOR__SERVER__PUBLIC_URL=…), which
# takes precedence over the value here.

[server]
# Public URL clients reach the server on. Drives cookies, OAuth redirects, the
# JWT issuer, and the links in sign-in emails. MUST be your real external URL
# for any non-localhost / multi-user deployment — otherwise every sign-in link
# points at localhost and is unusable.
public_url = "http://localhost:8080"
cookie_domain = "localhost"

# OAuth callback URLs allowed for the web client, on top of the implicit
# {public_url}/auth/callback. Needed when a SPA runs on a different origin than
# the server — without it, /v1/oauth/authorize rejects the sign-in with 400
# "redirect_uri does not match any registered URI".
#web_redirect_uris = ["http://localhost:3000/auth/callback"]

[server.cors]
# Browser origins allowed to call the API. `*` is a multi-level wildcard
# (https://*.acme.com matches a.acme.com and a.b.acme.com).
allowed_origins = ["http://localhost:*", "https://localhost:*", "http://127.0.0.1:*"]
allow_credentials = true
max_age_secs = 86400

[engine]
# The server reaches the engine by its compose service name. Don't change these
# unless you rename the service in docker-compose.yml.
host = "eddytor-engine"
jwks_url = "http://eddytor-server:8080/.well-known/jwks.json"

[database]
max_connections = 10

[telemetry]
log_level = "info,datafusion_datasource=error,sqlx::postgres::notice=warn"
