apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eddytor.engine.name" . }}
  labels:
    {{- include "eddytor.labels" . | nindent 4 }}
    app: {{ include "eddytor.engine.name" . }}
spec:
  {{- if not .Values.engine.autoscaling.enabled }}
  replicas: {{ .Values.engine.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ include "eddytor.engine.name" . }}
  template:
    metadata:
      labels:
        {{- include "eddytor.labels" . | nindent 8 }}
        app: {{ include "eddytor.engine.name" . }}
    spec:
      serviceAccountName: {{ include "eddytor.engine.name" . }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $waitInit := include "eddytor.waitForDbInit" . }}
      {{- if trim $waitInit }}
      initContainers:
        {{- $waitInit | nindent 8 }}
      {{- end }}
      containers:
        - name: eddytor-engine
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/eddytor-ce-engine:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 50052
              name: grpc-flight
            - containerPort: 50053
              name: http-mcp
          securityContext:
            {{- include "eddytor.securityContext" . | nindent 12 }}
          env:
            # Server is the authoritative migrator; engine never migrates.
            - name: EDDYTOR_SKIP_MIGRATIONS
              value: "true"
            {{- include "eddytor.configEnv" . | nindent 12 }}
            {{- include "eddytor.secretEnv" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 50051
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: 50051
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
