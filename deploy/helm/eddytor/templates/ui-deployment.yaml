{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eddytor.ui.name" . }}
  labels:
    {{- include "eddytor.labels" . | nindent 4 }}
    app: {{ include "eddytor.ui.name" . }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app: {{ include "eddytor.ui.name" . }}
  template:
    metadata:
      labels:
        {{- include "eddytor.labels" . | nindent 8 }}
        app: {{ include "eddytor.ui.name" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: eddytor-ui
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/{{ .Values.ui.image.name }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # Public server URL for the top-level OAuth redirect (browser nav).
            - name: EDDYTOR_API_BASE_URL
              value: {{ .Values.ui.apiBaseUrl | default .Values.config.publicUrl | quote }}
            # Server-to-server path for the BFF proxy — in-cluster Service name.
            - name: EDDYTOR_INTERNAL_API_URL
              value: {{ printf "%s:8080" (include "eddytor.server.name" .) | quote }}
            # This UI's own public origin (registered as a server web redirect_uri).
            - name: EDDYTOR_UI_ORIGIN
              value: {{ .Values.ui.origin | quote }}
            - name: EDDYTOR_WEB_CLIENT_ID
              value: {{ .Values.ui.clientId | quote }}
            - name: EDDYTOR_COOKIE_DOMAIN
              value: {{ .Values.ui.cookieDomain | quote }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
{{- end }}
