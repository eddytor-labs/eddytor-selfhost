{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eddytor.secretName" . }}
  labels:
    {{- include "eddytor.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Fail the render with a clear message if a required secret is unset, rather
  # than letting the Deployment hit CreateContainerConfigError on a missing key.
  EDDYTOR_DATABASE_URL: {{ required "secrets.values.EDDYTOR_DATABASE_URL is required (or set secrets.existingSecret) — e.g. postgres://user:pass@host:5432/eddytor" .Values.secrets.values.EDDYTOR_DATABASE_URL | quote }}
  EDDYTOR_ENCRYPTION_KEY: {{ required "secrets.values.EDDYTOR_ENCRYPTION_KEY is required (or set secrets.existingSecret) — base64 of 32 random bytes" .Values.secrets.values.EDDYTOR_ENCRYPTION_KEY | quote }}
  EDDYTOR_API_KEY_SECRET: {{ required "secrets.values.EDDYTOR_API_KEY_SECRET is required (or set secrets.existingSecret) — 32+ byte HMAC secret" .Values.secrets.values.EDDYTOR_API_KEY_SECRET | quote }}
  {{- range $k, $v := .Values.secrets.values }}
  {{- if and $v (not (has $k (list "EDDYTOR_DATABASE_URL" "EDDYTOR_ENCRYPTION_KEY" "EDDYTOR_API_KEY_SECRET"))) }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
