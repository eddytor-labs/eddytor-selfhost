{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eddytor.ui.name" . }}
  labels:
    {{- include "eddytor.labels" . | nindent 4 }}
    app: {{ include "eddytor.ui.name" . }}
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    app: {{ include "eddytor.ui.name" . }}
  ports:
    - port: 3000
      targetPort: 3000
      name: http
      {{- if and (eq .Values.ui.service.type "NodePort") .Values.ui.service.nodePort }}
      nodePort: {{ .Values.ui.service.nodePort }}
      {{- end }}
{{- end }}
